<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="cakeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF85C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1493;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cake layer 1 (top) -->
  <rect x="20" y="20" width="60" height="15" rx="3" fill="url(#cakeFill)" stroke="#C41E3A" stroke-width="2"/>
  
  <!-- Frosting swirl -->
  <path d="M 25 18 Q 35 10 50 10 Q 65 10 75 18" fill="#FFD700" stroke="#FFA500" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Sprinkles -->
  <line x1="35" y1="8" x2="33" y2="2" stroke="#FF69B4" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="5" x2="50" y2="0" stroke="#FF1493" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="10" x2="68" y2="3" stroke="#FFB6C1" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Cherry -->
  <circle cx="50" cy="12" r="4" fill="#DC143C" stroke="#8B0000" stroke-width="1"/>
  
  <!-- Cake layer 2 (bottom) -->
  <rect x="20" y="35" width="60" height="15" rx="3" fill="#FFB6D9" stroke="#C41E3A" stroke-width="2"/>
  
  <!-- Cake layer 3 (base) -->
  <rect x="20" y="50" width="60" height="20" rx="3" fill="#FFD6E8" stroke="#C41E3A" stroke-width="2"/>
  
  <!-- Plate -->
  <ellipse cx="50" cy="72" rx="35" ry="8" fill="#E8E8E8" stroke="#999" stroke-width="1.5"/>
  <ellipse cx="50" cy="70" rx="33" ry="6" fill="#F5F5F5"/>
</svg>