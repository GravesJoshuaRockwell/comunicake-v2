<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Cake slice -->
  <defs>
    <linearGradient id="cakeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C41E3A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cake slice shape -->
  <path d="M 50 10 L 85 85 L 50 85 Z" fill="url(#cakeGradient)" stroke="#8B0000" stroke-width="1.5"/>
  
  <!-- Frosting on top -->
  <ellipse cx="67.5" cy="32" rx="12" ry="8" fill="#FFD700" opacity="0.8"/>
  
  <!-- Sprinkles -->
  <line x1="60" y1="25" x2="58" y2="18" stroke="#FF69B4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="28" x2="73" y2="20" stroke="#FF1493" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="75" y1="35" x2="80" y2="30" stroke="#FF69B4" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Cherry on top -->
  <circle cx="67" cy="22" r="3" fill="#DC143C"/>
</svg>